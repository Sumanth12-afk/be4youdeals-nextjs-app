# SonarQube Configuration for Be4YouDeals Next.js App

# Project identification
sonar.projectKey=Sumanth12-afk_be4youdeals-nextjs-app
sonar.projectName=Be4YouDeals Next.js App
sonar.projectVersion=1.0.0
sonar.organization=sumanth12-afk

# Source code
sonar.sources=pages,components,lib,styles
# No tests directory exists yet, so we'll exclude test configuration
# sonar.tests=tests
# sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/out/**,**/.next/**,**/public/**,**/*.config.js,**/*.config.ts,**/pages/api/admin/**,**/components/admin/**,**/lib/admin*.ts

# TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Code coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/pages/_app.tsx,**/pages/_document.tsx

# Duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Security
sonar.security.hotspots.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx

# Quality gates
sonar.qualitygate.wait=true

# Set reasonable thresholds for quality gate
# Allow higher technical debt ratio for startup projects
sonar.qualitygate.timeout=300

# Issue thresholds
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# Ignore TODO comments
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# Ignore console.log statements (we use them for admin logging)
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2228
sonar.issue.ignore.multicriteria.e2.resourceKey=**/pages/api/admin/**

# Ignore cognitive complexity in API routes
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=**/pages/api/**

# Ignore duplicate literals (common in React/Next.js)
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S1192
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*

# Set minimum thresholds (more lenient for startup projects)
# Don't fail if we don't have test coverage yet
sonar.coverage.minimum=0

# Allow some code duplication (common in UI components)
sonar.cpd.minimumTokens=100

# Set technical debt rating thresholds
sonar.technicalDebt.ratingGrid=0.05,0.1,0.2,0.5
