name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Test job
  test:
    name: "🧪 Run Tests & Build"
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint --if-present
    
    - name: Run type check
      run: npm run type-check --if-present
    
    - name: Run security audit
      run: npm audit --audit-level moderate || true
    
    - name: Build application
      run: npm run build
      env:
        CI: true

  # SonarQube Analysis (SonarCloud)
  sonarqube:
    name: "🔍 SonarQube Code Quality"
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        CI: true
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: "https://sonarcloud.io"

  # Build and push Docker image
  build-and-push:
    name: "🐳 Build & Push Docker Image"
    needs: sonarqube
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set image reference
      run: echo "IMAGE_BASE=${{ env.REGISTRY }}/${IMAGE_NAME,,}" >> $GITHUB_ENV
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_BASE }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch
          type=sha,prefix=sha-
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Trivy Security Scan
  trivy-scan:
    name: "🛡️ Trivy Security Scan"
    needs: build-and-push
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set image reference
      run: echo "IMAGE_REF=${{ env.REGISTRY }}/${IMAGE_NAME,,}:latest" >> $GITHUB_ENV
    
    - name: Run Trivy vulnerability scanner (CRITICAL)
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: ${{ env.IMAGE_REF }}
        format: table
        exit-code: 1
        vuln-type: 'os,library'
        severity: CRITICAL
        output: trivy-report.txt
    
    - name: Run Trivy scan for SARIF (CRITICAL + HIGH)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_REF }}
        format: sarif
        vuln-type: 'os,library'
        severity: CRITICAL,HIGH
        output: trivy-results.sarif
    
    - name: Upload Trivy scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: trivy-report.txt
    
    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif

  # Deploy to Netlify
  deploy-netlify:
    name: "🚀 Deploy to Netlify"
    needs: trivy-scan
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://vibricsdeals.netlify.app
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Deploy to Netlify (with Next.js Plugin - supports API routes)
      uses: nwtgck/actions-netlify@v3.0.0
      with:
        publish-dir: '.'
        production-deploy: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Automated deployment with API routes support"
        enable-pull-request-comment: true
        enable-commit-comment: true
        overwrites-pull-request-comment: true
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    
    - name: Post deployment notification
      if: success()
      run: |
        echo "✅ Netlify deployment successful!"
        echo "🚀 Application is live at: https://vibricsdeals.netlify.app"
