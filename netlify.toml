# Netlify Configuration for Next.js with API Routes Support

[build]
  command = "npx next build"
  publish = ".next"
  
[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Enable Next.js Runtime Plugin (Essential for API routes to work)
[[plugins]]
  package = "@netlify/plugin-nextjs"
# Redirect rules for Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# API Routes environment variables (configure these in Netlify dashboard)
[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://vibricsdeals.netlify.app"

# Functions configuration for API routes
[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"
  included_files = ["serviceAccountKey.json"]

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

